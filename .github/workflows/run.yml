name: Run Trading System

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 23 * * 0-4'   # ✅ 4:30 AM IST (Mon–Fri)
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Upgrade pip
      run: python -m pip install --upgrade pip

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install flask yfinance pandas requests mplfinance matplotlib reportlab openai

    - name: Run script
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    - name: Upload Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trading-output
        path: |
          run_*/
          charts/
